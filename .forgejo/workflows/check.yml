name: nix flake check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: [native-x86_64-linux, bigger-parallel]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-home
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ vars.SSH_KNOWN_HOSTS }}
          gpg-key-id: ${{ vars.GPG_KEY_ID }}

      - run: nix fmt -L --accept-flake-config --log-format raw -- --ci
      - run: nix flake check --accept-flake-config --log-format raw
