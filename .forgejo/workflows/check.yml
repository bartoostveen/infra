name: nix flake check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: [native-x86_64-linux, bigger-parallel]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-home@53c4834f1dcf7b3cfdc500335c4c7a3c16c3f92e # v1 # v1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-known-hosts: ${{ vars.SSH_KNOWN_HOSTS }}
          gpg-key-id: ${{ vars.GPG_KEY_ID }}

      - run: nix fmt -L --accept-flake-config -- --ci
      - run: nix flake check -L --accept-flake-config
