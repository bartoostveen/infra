name: nix flake check

on:
  push:
  pull_request:
    branches:
      - master

jobs:
  check:
    runs-on: [docker, bigger-parallel]
    steps:
      - uses: actions/checkout@v4
      - run: nix fmt -L --accept-flake-config --log-format raw -- --ci
      - run: nix flake check --accept-flake-config --log-format raw
