# derived from https://git.toostveen.nl/tom/puntbestanden/src/branch/hoofdlijn/.forgejo/workflows/update-kernels.yml

"on":
  schedule:
    - cron: "0 4/8 * * *"
      timezone: Europe/Amsterdam
  workflow_dispatch: {}

jobs:
  update-kernels:
    runs-on: [gpg, native-x86_64-linux]
    steps:
      - name: import GPG key
        run: |
          gpg --import <(cat <<< "${GPG_PRIVKEY:?}")
        env:
          GPG_PRIVKEY: ${{ secrets.GPG_PRIVKEY }}

      - name: configure git
        run: |
          git config --global user.name "forgejo-actions[bot]"
          git config --global user.email "git@bartoostveen.nl"
          git config --global push.default simple
          git config --global commit.gpgSign true
          git config --global user.signingKey "${GPG_KEY_ID:?}"
        env:
          GPG_KEY_ID: ${{ vars.GPG_KEY_ID }}

      - uses: actions/checkout@v4

      - name: perform update
        id: update
        run: |
          git switch "$FORGEJO_REF_NAME"
          kver() {
            nix eval --inputs-from . --raw nixos-small#linuxPackages_latest.kernel.version --accept-flake-config
          }
          old="$(kver)"
          nix flake update --commit-lock-file nixos-small --accept-flake-config
          new="$(kver)"
          if [ "$old" != "$new" ]; then
            git commit --amend -m "chore: linux $old -> $new"
            echo continue=1 >> "$FORGEJO_OUTPUT"
          else
            echo continue=0 >> "$FORGEJO_OUTPUT"
          fi

      - name: send PR
        if: ${{ steps.update.outputs.continue == '1' }}
        run: |
          base="$(git branch --show-current)"
          if [[ "$(git rev-list origin/"$base"..HEAD --count)" -ne 0 ]]; then
            head="push-$(git rev-parse --short HEAD)"
            git switch -c "$head"
            git push --force-with-lease origin "$head"
            curl "$FORGEJO_SERVER_URL/api/v1/repos/$FORGEJO_REPOSITORY/pulls" \
              -H "Authorization: token $FORGEJO_TOKEN" \
              --json "{
                \"base\": \"$base\",
                \"head\": \"$head\",
                \"title\": \"chore: update kernel\"
              }"
          fi